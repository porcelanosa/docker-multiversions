server {
    listen 80;
    server_name esiapps.local;
    client_max_body_size 300M;
    root /data/esia.local/web;

    # Vue.js приложение и ВСЕ его ресурсы (включая src/assets)
    location ^~ /frontend/ {
        proxy_pass http://host.docker.internal:5712;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Для HMR (Hot Module Replacement)
        proxy_read_timeout 86400;
    }

    # Vite специальные пути (HMR, modules, etc.)
    location ~ ^/(@vite|@fs|node_modules)/ {
        proxy_pass http://host.docker.internal:5712;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket для Laravel Reverb
    location ^~ /back/app/ {

        rewrite ^/back(.*)$ $1 break;

        proxy_pass http://webapp83_wsl:8080;
        proxy_http_version 1.1;

        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Таймауты для WebSocket
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 5;

        # Отключаем буферизацию для WebSocket
        proxy_buffering off;
        proxy_cache off;
        proxy_redirect off;
    }

    # Laravel Backend - прямой доступ к Laravel через /back
    location ^~ /back/ {
        alias /data/esia.local/backend/public/;
        index index.php;

        # Убираем /back из пути и передаем в Laravel
        try_files $uri $uri/ @laravel_direct;

        # Обработка PHP файлов для Laravel
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass webapp83_wsl:9000;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param SCRIPT_NAME $fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }
    }

    # Обработчик для прямого доступа к Laravel
    location @laravel_direct {
        rewrite ^/back/(.*)$ /back/index.php?$query_string last;
    }

    # Assets из web/assets (для Yii2)
    location /assets/ {
        try_files $uri $uri/ @fallback;
    }

    # WebSocket для разработки
    location /ws {
        set $suffix "";
        if ($uri = /index.php) {
            set $suffix ?$query_string;
        }
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://127.0.0.1:8284$suffix;
    }

    # JavaScript файлы (только для НЕ Vue части)
    location ~* ^/(?!frontend/).*\.js$ {
        add_header Content-Type application/javascript;
        try_files $uri $uri/ @fallback;
    }

    # Статические файлы (только для НЕ Vue части)
    location ~* ^/(?!frontend/).*\.(jpg|jpeg|gif|css|svg|png|ico|html)$ {
        access_log off;
        expires max;
        try_files $uri $uri/ @fallback;
    }

    # api.php - гибридный обработчик
    # location ~ ^/api\.php$ {
    #     try_files $uri = 404;
    #     fastcgi_split_path_info ^(.+\.php)(/.+)$;
    #     fastcgi_pass webapp83_wsl:9000;
    #     fastcgi_index api.php;
    #     fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    #     include fastcgi_params;
    # }

    # PHP файлы в корне (Yii2)
    location ~ \.php$ {
        try_files $uri = 404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass webapp83_wsl:9000;
        fastcgi_index api.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Основной обработчик - все остальное идет через api.php (гибридный роутер)
    # location / {
    #     try_files $uri $uri/ @fallback;
    # }

    # Fallback - направляем в api.php для обработки Yii2/Laravel
    # location @fallback {
    #     fastcgi_pass webapp83_wsl:9000;
    #     fastcgi_index api.php;
    #     fastcgi_param SCRIPT_FILENAME $document_root/api.php;
    #     fastcgi_param REQUEST_URI $request_uri;
    #     include fastcgi_params;
    # }
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # и наконец правило обращения к php-fpm
    location ~* .php$ {
        try_files $uri = 404;
        fastcgi_split_path_info ^(.+.php)(/.+)$;
        fastcgi_pass webapp83_wsl:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
    error_log /var/log/nginx/esia_error.log;
    access_log /var/log/nginx/esia_access.log;
}