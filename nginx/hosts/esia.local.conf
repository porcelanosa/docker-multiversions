server {
    listen 80;
    server_name esiapps.local;
    client_max_body_size 300M;

    # =========================
    # 🔌 Reverb WebSocket
    # =========================
    location ^~ /back/app/ {
        rewrite ^/back(.*)$ $1 break;
        proxy_pass http://webapp83_wsl:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        proxy_cache off;
    }

    # =========================
    # 🔁 /back → /back/
    # =========================
    location = /back {
        return 301 /back/;
    }

    # =========================
    # 🧠 Laravel Backend (Исправлено)
    # =========================
    location ^~ /back/ {
        alias /data/esia.local/backend/public/;
        
        # ⚠️ Важно: убрали $uri/, чтобы не было 403 на папках
        # Если файл существует - отдаём, иначе в @laravel_backend
        try_files $uri @laravel_backend;
        
        # Запрещаем доступ к скрытым файлам (.htaccess, .env и т.д.)
        location ~ /\. {
            deny all;
        }
    }

    # Обработчик Laravel (все запросы на index.php)
    location @laravel_backend {
        internal;  # Запрещаем прямой доступ к этой локации
        
        # Убираем /back/ из URI
        rewrite ^/back/(.*)$ /$1 break;
        
        fastcgi_pass webapp83_wsl:9000;
        
        # Явно задаём все параметры
        fastcgi_param SCRIPT_FILENAME /data/esia.local/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /data/esia.local/backend/public;
        fastcgi_param REQUEST_URI $uri$is_args$args;  # $uri уже без /back/ благодаря rewrite
        fastcgi_param PATH_INFO $uri;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        
        # Стандартные FastCGI параметры (без REQUEST_URI, чтобы не переопределить)
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx/$nginx_version;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param HTTPS $https if_not_empty;
        
        fastcgi_read_timeout 300;
    }

    # =========================
    # ⚡ Vite служебные пути
    # =========================
    location ~ ^/(@vite|@fs|node_modules|__vite_ping) {
        # proxy_pass http://webapp83_wsl:5712;
        proxy_pass http://host.docker.internal:5712; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # =========================
    # 🌐 FRONTEND (Vite)
    # =========================
    location / {
        # proxy_pass http://webapp83_wsl:5712;
        proxy_pass http://host.docker.internal:5712; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    error_log  /var/log/nginx/esiapps_error.log;
    access_log /var/log/nginx/esiapps_access.log;
}