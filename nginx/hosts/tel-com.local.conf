server {
    listen 80;
    server_name tel-com.local;

    root /data/tel-com.local/;
    index index.html index.php;
    client_max_body_size 300M;

    location = /lk {
        return 301 /lk/;
    }

    # API обработка
    location ^~ /lk/api {
        if ($http_origin ~* "^(http|https)://localhost(:[0-9]+)?$") {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        }
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        alias /data/tel-com.local/lka/backend/public/;
        try_files $uri $uri/ @api;

        location ~* \.php {
            include fastcgi_params;
            fastcgi_pass webapp83_wsl:9000;
            fastcgi_param SCRIPT_FILENAME /data/tel-com.local/lka/backend/public/index.php;
        }
    }

    # Backend обработка
    location ^~ /lk/backend {
        alias /data/tel-com.local/lka/backend/public/;
        index index.php;
        try_files $uri $uri/ @backend;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass webapp83_wsl:9000;
            fastcgi_param SCRIPT_FILENAME /data/tel-com.local/lka/backend/public/index.php;
            fastcgi_param SCRIPT_NAME /lk/backend/index.php;
            fastcgi_param REQUEST_URI $request_uri;
        }
    }

    # Frontend - все файлы отдаются из dist директории
    location /lk/ {
        alias /data/tel-com.local/lka/frontend/dist/;
        try_files $uri $uri/ /lk/index.html;
        
        # Настройки кеширования для статических файлов
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
            access_log off;
        }
        
        # Отключаем кеширование для HTML
        location ~* \.(html)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # Общие статические файлы (для корня сайта)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location @api {
        if ($http_origin ~* "^(http|https)://localhost(:[0-9]+)?$") {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        }
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        rewrite /lk/api/(.*)$ /lk/api/index.php?/$1 last;
    }

    location @backend {
        rewrite /lk/backend/(.*)$ /lk/backend/index.php?/$1 last;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass webapp83_wsl:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
   
    error_log /var/log/nginx/tel-com.local_error.log;
    access_log /var/log/nginx/tel-com.local_access.log;
}