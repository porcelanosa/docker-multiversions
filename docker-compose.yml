  # PHP 7.4
  webapp-7-4:
    build:
      args:
        uname: ${PHP_UNAME}
        uid: ${PHP_UID}
        gid: ${PHP_GID}
      context: ./fpm/fpm-7.4
      dockerfile: Dockerfile
    image: webapp/php7.4
    container_name: webapp74_wsl
    ports:
      - "${XDEBUG_PORT_74}:9003" # xDebug
      - "9074:9074"              # Laravel Octane или кастомный HTTP порт
    volumes:
      - ./code:${SITE_PATH}
      - ./.env:${SITE_PATH}/.env
    environment:
      COMPOSER_MEMORY_LIMIT: 2G
    expose:
      - 9000
      - 9003
      - 9074
    networks:
      - app-net
    depends_on:
      - db_maria_wsl

  # PHP 8.1
  webapp-8-1:
    build:
      args:
        uname: ${PHP_UNAME}
        uid: ${PHP_UID}
        gid: ${PHP_GID}
      context: ./fpm/fpm-8.1
      dockerfile: Dockerfile
    image: webapp/php8.1
    container_name: webapp81_wsl
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${XDEBUG_PORT_81}:9003" # xDebug
      - "9081:9081"              # Laravel Octane или кастомный порт
    volumes:
      - ./code:${SITE_PATH}
      - ./.env:${SITE_PATH}/.env
    environment:
      COMPOSER_MEMORY_LIMIT: 2G
      XDEBUG_CONFIG: client_host=${XDEBUG_REMOTE_HOST} client_port=${XDEBUG_STORM_PORT} remote_enable=1
      PHP_IDE_CONFIG: serverName=${XDEBUG_STORM_SERVER_NAME}
    expose:
      - 9000
      - 9003
      - 9081
    networks:
      - app-net
    depends_on:
      - db_maria_wsl

  # PHP 8.3
  webapp-8-3:
    build:
      args:
        uname: ${PHP_UNAME}
        uid: ${PHP_UID}
        gid: ${PHP_GID}
      context: ./fpm/fpm-8.3
      dockerfile: Dockerfile
    image: webapp/php8.3
    container_name: webapp83_wsl
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # - "${XDEBUG_PORT_83}:9003"     # xDebug
      - "9383:9003"
      - "5185:5185"     # Vite
      - "5712:5712"
      - "9085:9083"     # Laravel Octane или другой HTTP порт
      - "8080:8080"  # для Reverb
    volumes:
      - ./code:${SITE_PATH}:cached
      - ./.env:${SITE_PATH}/.env:cached
      - ./supervisor/supervisord.conf:/etc/supervisor/supervisord.conf
      - ./supervisor/conf.d:/etc/supervisor/conf.d
      # - ./supervisor/logs:/var/log/supervisor
    environment:
      COMPOSER_MEMORY_LIMIT: 2G
      CHOKIDAR_USEPOLLING: true
      XDEBUG_CONFIG: client_host=${XDEBUG_REMOTE_HOST} client_port=${XDEBUG_STORM_PORT} remote_enable=1
      PHP_IDE_CONFIG: serverName=${XDEBUG_STORM_SERVER_NAME}
    expose:
      - 9000
      - 9003
      - 9083    
      - 8080 
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - db_maria_wsl

  # PHP 8.4
  webapp-8-4:
    build:
      args:
        uname: ${PHP_UNAME}
        uid: ${PHP_UID}
        gid: ${PHP_GID}
      context: ./fpm/fpm-8.4
      dockerfile: Dockerfile
    image: webapp/php8.4
    container_name: webapp84_wsl
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${XDEBUG_PORT_84}:9003" # xDebug
      - "5719:5719"
      # - "9084:9084" # Laravel Octane или кастомный порт
    volumes:
      - ./code:${SITE_PATH}
      - ./.env:${SITE_PATH}/.env
    environment:
      COMPOSER_MEMORY_LIMIT: 2G
    expose:
      - 9000
      - 9003
      - 9084
      - 8080
    networks:
      - app-net
    depends_on:
      - db_maria_wsl

  # PHP 8.5
  # webapp-8-5:
    # build:
    #   args:
    #     uname: ${PHP_UNAME}
    #     uid: ${PHP_UID}
    #     gid: ${PHP_GID}
    #   context: ./fpm/fpm-8.5
    #   dockerfile: Dockerfile
    # image: webapp/php8.5
    # container_name: webapp85_wsl
    # restart: unless-stopped
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    # ports:
    #   - "${XDEBUG_PORT_85}:9003" # xDebug
    #   # - "9084:9084" # Laravel Octane или кастомный порт
    # volumes:
    #   - ./code:${SITE_PATH}
    #   - ./.env:${SITE_PATH}/.env
    # environment:
    #   COMPOSER_MEMORY_LIMIT: 2G
    # expose:
    #   - 9000
    #   - 9003
    #   - 9084
    #   - 8080
    # networks:
    #   - app-net
    # depends_on:
    #   - db_maria_wsl
    #   - db_mysql_wsl

  # Nginx
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: webapp/nginx
    container_name: nginx_wsl
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # - "packs.local:host-gateway"
    ports:
      - "80:80"
      # - "8080:8080"  # для Reverb
      - "443:443"
    volumes:
      - ./code:/data:cached
      - ./nginx/hosts:/etc/nginx/sites-enabled
      - ./nginx/certs:/etc/nginx/certs
      - ./nginx/logs:/var/log/nginx
    networks:
      - app-net
    depends_on:
      - webapp-7-4
      - webapp-8-1
      - webapp-8-3
      - webapp-8-4
      - db_maria_wsl
# MariaDB
  db_maria_wsl:
    image: mariadb:latest
    container_name: maria_db_wsl
    restart: always
    ports:
      - "3306:3306" # Стандартный порт
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}        # Дефолтная БД
      MARIADB_USER: ${MARIADB_USER:-app}                # Не-root пользователь
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}             # Пароль для не-root
      TZ: ${TZ:-Europe/Moscow}                       # Часовой пояс
    volumes:
      - ./dbdata/mysqldata:/var/lib/mysql
    # healthcheck:
    #   test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 60s  # MariaDB стартует дольше, чем простой процесс
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: >
      --max-connections=500
      --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-1G}
      --skip-name-resolve
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    networks:
      - app-net

  # MySQL 8.0
  db_mysql_wsl:
    image: mysql:8.0.40
    container_name: mysql_db_wsl
    restart: always
    ports:
      - "3307:3306" # Пробрасываем на другой порт хоста
    environment:      
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - ./dbdata/mysql8:/var/lib/mysql      
      - ./dbdata/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./dbdata/mysql/logs:/var/log/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: >
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
      --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-1G}
      --skip-name-resolve
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
    networks:
      - app-net
  # Redis
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    image: redis_image
    container_name: redis_container_wsl
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "6378:6379"
    volumes:
      - ./redis/cache:/data/redis_cache
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - app-net
    depends_on:
      - db_maria_wsl

volumes:
  es_data:
    driver: local

networks:
  app-net:
    name: wsl_net
    driver: bridge
