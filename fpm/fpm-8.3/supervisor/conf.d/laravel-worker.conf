# /etc/supervisor/conf.d/laravel-worker.conf
# Конфигурация для Laravel Queue Worker

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /data/esia.local/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/data/esia.local/backend
autostart=true
autorestart=true
startsecs=1
startretries=3
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/laravel-worker.log
stdout_logfile_maxbytes=100MB
stdout_logfile_backups=2
stopwaitsecs=3600
killasgroup=true
priority=999